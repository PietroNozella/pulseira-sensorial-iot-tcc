name: FallSense Backend CI

# Define quando os testes serão executados
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  testar-api:
    runs-on: ubuntu-latest
    
    # Define que todos os comandos devem rodar dentro da pasta Backend
    defaults:
      run:
        working-directory: ./Backend

    steps:
    - name: Clonar o Repositório
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Acelera a instalação guardando as bibliotecas em cache

    - name: Instalar Dependências do Sistema
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx pytest-asyncio argon2-cffi

    - name: Executar Testes Unitários com Pytest
      run: |
        # Roda o pytest na pasta tests/ e exibe os resultados no console
        pytest tests/ -v